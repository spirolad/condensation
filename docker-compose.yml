version: '3.8'

name: condensation

services:
  auth:
    build:
      context: ./authentication
      dockerfile: Dockerfile
    restart: on-failure
    ports:
      - "8000:80"
    environment:
      - APP_NAME=Laravel
      - APP_ENV=local
      - APP_KEY=base64:9FmWeE2e3HkFtk58XQjWxwZkG/f2iK45Lq/GgqPqF+o=
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      - DB_CONNECTION=pgsql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=auth_db
      - DB_USERNAME=postgres
      - DB_PASSWORD=postgres
      - CLIENT_ID=ead85488-0ee1-41f9-9703-eac26103f5f4
      - CACHE_STORE=database
      - SESSION_DRIVER=database
      - QUEUE_CONNECTION=database
      # Local dev admin account (override in .env or CI secrets for other environments)
      - ADMIN_EMAIL=admin@admin.com
      - ADMIN_PASSWORD=admin
      - ADMIN_NAME=Admin
    volumes:
      # Mount source for live edits without rebuilding
      - ./authentication:/var/www/html
      # Protect vendor built inside the image from being overwritten by host
      - /var/www/html/vendor
      # Preserve storage permissions set by the image
      - /var/www/html/storage
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: deps
    # We override the command to start the Next.js development server locally
    command: bun run dev
    ports:
      - "4000:3000"
    environment:
      - AUTH_URL=http://localhost:8000
      - API_URL=http://auth:80
      - BACKEND_URL=http://backend:8080
      - CLIENT_ID=ead85488-0ee1-41f9-9703-eac26103f5f4
      - REDIRECT_URI=http://localhost:4000/api/auth/callback
      - NODE_ENV=development
      - INTERNAL_SECRET=${INTERNAL_SECRET:-webhook-internal-secret}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY=${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY}
    volumes:
      # We mount the source code for hot-reloading in dev
      - ./frontend:/app
      # We protect the inside container's node_modules from being overwritten by the host
      - /app/node_modules
    depends_on:
      - auth

  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  postgres-game:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: game_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d game_db"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_game_data:/var/lib/postgresql/data
      - ./scripts/V1__create_game_catalog_schema.sql:/docker-entrypoint-initdb.d/V1__create_game_catalog_schema.sql:ro
      - ./scripts/seed_games.sql:/docker-entrypoint-initdb.d/seed_games.sql:ro

  backend:
    build:
      context: ./backend
    container_name: catalog_backend
    hostname: backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - AUTH_URL=http://auth:80
      - INTERNAL_SECRET=${INTERNAL_SECRET:-webhook-internal-secret}
      # Expose actuator prometheus endpoint so Prometheus can scrape metrics
      - MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE=health,info,prometheus
      - MANAGEMENT_ENDPOINTS_WEB_BASE_PATH=/actuator
      - MANAGEMENT_ENDPOINT_PROMETHEUS_ENABLED=true
    depends_on:
      postgres-game:
        condition: service_healthy

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - backend

  grafana:
    image: grafana/grafana:9.5.8
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  e2e-tests:
    build:
      context: ./e2e-tests
      dockerfile: Dockerfile
    network_mode: host
    environment:
      - E2E_BASE_URL=http://localhost:4000
      - E2E_TIMEOUT=3000
    profiles:
      - e2e


volumes:
  postgres_data:
  postgres_game_data:
  kafka_data:
  prometheus_data:
  grafana_data:

