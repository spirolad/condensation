sonar.projectKey=spirolad_condensation
sonar.organization=condensation

# This is the name and version displayed in the SonarCloud UI.
sonar.projectName=condensation
sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
sonar.sources=backend/src,frontend,authentication

# Java binaries location (SonarQube/Cloud needs compiled classes for Java analysis)
sonar.java.binaries=backend/target/classes

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8

# Code coverage reports
sonar.coverage.jacoco.xmlReportPaths=backend/target/site/jacoco/jacoco.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
sonar.php.coverage.reportPaths=authentication/coverage/clover.xml
