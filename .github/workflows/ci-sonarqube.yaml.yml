name: SonarQube Analysis
on:
  push:
    branches:
      - master
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build backend with Maven (includes tests + JaCoCo coverage)
        run: |
          cd backend
          ./mvnw clean package
          cd ..

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm install
          cd ..

      - name: Generate frontend test coverage (Jest)
        run: |
          cd frontend
          npm run test:coverage || true
          cd ..

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer

      - name: Install auth dependencies
        run: |
          cd authentication
          composer install --no-dev
          cd ..

      - name: Generate auth test coverage (PHPUnit)
        run: |
          cd authentication
          ./vendor/bin/phpunit --coverage-clover=coverage/clover.xml || true
          cd ..

      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@7006c4492b2e0ee0f816d36501671557c97f5995 # v8.1.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}