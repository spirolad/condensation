name: _Deploy with Ansible

on:
  workflow_call:
    inputs:
      env_name:
        description: "Environment name (e.g. dev, prod)"
        required: true
        type: string
    secrets:
      AWS_ACCESS_KEY_ID:
        description: "AWS Access Key ID"
        required: true
      AWS_SECRET_ACCESS_KEY:
        description: "AWS Secret Access Key"
        required: true
  workflow_dispatch:
    inputs:
      env_name:
        description: "Environment name (e.g. dev, prod)"
        required: true
        type: string
      aws_region:
        description: "AWS region for provisioning"
        required: false
        default: "us-east-1"
      ec2_ssh_user:
        description: "SSH user for the EC2 instance"
        required: false
        default: "ec2-user"

jobs:
  deploy:
    name: Deploy to ${{ inputs.env_name }} via Ansible
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          sudo apt-get update
          python -m pip install --upgrade pip
          python -m pip install awscli ansible boto3 botocore

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: '1.9.8'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ inputs.aws_region }}

      - name: Validate AWS credential environment
        run: |
          echo "AWS_ACCESS_KEY_ID set: ${AWS_ACCESS_KEY_ID:+yes}"
          echo "AWS_SECRET_ACCESS_KEY set: ${AWS_SECRET_ACCESS_KEY:+yes}"
          echo "AWS_SESSION_TOKEN set: ${AWS_SESSION_TOKEN:+yes}"
          aws configure list
          aws sts get-caller-identity

      - name: Terraform init
        working-directory: aws
        run: terraform init

        
      - name: Terraform plan
        working-directory: aws
        run: terraform plan -var-file="environnement/prd.tfvars"
        
      - name: Terraform apply
        working-directory: aws
        run: terraform apply -auto-approve -var-file="environnement/prd.tfvars"

      - name: Get Terraform outputs
        id: tf_outputs
        working-directory: aws
        run: |
          terraform output -json > /tmp/tf_outputs.json
          echo "public_ip=$(python - <<'PY'
          import json
          output=json.load(open('/tmp/tf_outputs.json'))
          print(output['ec2_instance_public_ip']['value'])
          PY)" >> $GITHUB_OUTPUT
          echo "secret_name=$(python - <<'PY'
          import json
          output=json.load(open('/tmp/tf_outputs.json'))
          print(output['ec2_secret_key_name']['value'])
          PY)" >> $GITHUB_OUTPUT

      - name: Retrieve EC2 private key from Secrets Manager
        run: |
          mkdir -p ~/.ssh
          aws secretsmanager get-secret-value --secret-id "${{ steps.tf_outputs.outputs.secret_name }}" --query 'SecretString' --output text > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa

      - name: Run Ansible Playbook
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ inputs.aws_region }}
        run: |
          ansible-playbook -i "${{ steps.tf_outputs.outputs.public_ip }}," \
            infra/ansible/deploy.yml \
            -e "env_name=${{ inputs.env_name }}" \
            --user "${{ inputs.ec2_ssh_user }}" \
            --private-key ~/.ssh/id_rsa \
            --ssh-common-args='-o StrictHostKeyChecking=no'
