name: _Test Node

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Directory containing the Next.js app"
        required: false
        type: string
        default: "."

jobs:
  test:
    name: Lint & Test (Node)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ${{ inputs.working-directory }}/node_modules
          key: bun-${{ hashFiles(format('{0}/bun.lock', inputs.working-directory)) }}

      - name: Install dependencies
        run: bun install

      # - name: Dependency vulnerability scan
        # run: bun audit

      - name: Lint
        run: bun run lint

      - name: Create env file
        run: |
          cp .env.example .env

      - name: Build
        run: bun run build
        env:
          AUTH_URL: http://localhost:8000
          API_URL: http://localhost:80
          CLIENT_ID: ead85488-0ee1-41f9-9703-eac26103f5f4
          REDIRECT_URI: http://localhost:4000/api/auth/callback
